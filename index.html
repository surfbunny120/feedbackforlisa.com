---
layout: default
---

<div class="container">
  <h1 class="site-title">{{ site.title }}</h1>
  <p class="tagline">{{ site.description }}</p>

  <section class="episodes">
    <h2>Chapters</h2>
    {% for episode in site.episodes %}
    <a href="{{ episode.page | relative_url }}" class="link-block">
      #{{ episode.number }}: {{ episode.title }}
    </a>
    {% endfor %}
  </section>

  <section class="signup">
    <h2>Find Out When New Episodes Drop</h2>
    <form id="email-form" class="email-form">
      <input type="email" name="email" placeholder="your email" required>
      <button type="submit">Submit</button>
    </form>
    <p id="form-message" class="form-message"></p>
  </section>
</div>

<script>
  document.getElementById('email-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var email = this.email.value;
    var msg = document.getElementById('form-message');
    var btn = this.querySelector('button');
    btn.disabled = true;
    btn.textContent = '...';

    fetch('https://script.google.com/macros/s/AKfycbxUpB91upbTaFRDe0QzHGIa-frvZrD3XKrWFGkAJkiQh-kJaqdMhuHWV2llCNxpl4EdhQ/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    }).then(function() {
      msg.textContent = 'You\'re in!';
      msg.style.color = '#111';
      btn.textContent = 'Submit';
      btn.disabled = false;
      document.getElementById('email-form').reset();
    }).catch(function() {
      msg.textContent = 'Something went wrong. Try again?';
      msg.style.color = '#FC00F9';
      btn.textContent = 'Submit';
      btn.disabled = false;
    });
  });
</script>
