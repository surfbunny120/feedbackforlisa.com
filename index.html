---
layout: default
---

<div class="container">
  <h1 class="site-title">{{ site.title }}</h1>
  <p class="tagline">{{ site.description }}</p>

  <section class="episodes">
    <h2>Episodes</h2>
    {% for episode in site.episodes %}
    <a href="{{ episode.page }}" class="link-block">
      Episode {{ episode.number }}: {{ episode.title }}
    </a>
    {% endfor %}
  </section>
</div>
