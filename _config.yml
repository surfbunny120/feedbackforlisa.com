title: "Feedback for Lisa"
description: "Help Lisa by sharing your feedback about The Pitch."
url: "https://feedbackforlisa.com"
baseurl: ""

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag

# Episodes
episodes:
  - number: 1
    title: "Lucky"
    page: "/episode-1"
  - number: 2
    title: "An Honest Mistake"
    page: "/episode-2"
  - number: 3
    title: "A Game"
    page: "/episode-3"
    coming_soon: true
    coming_soon_text: "Coming April 3!"
  - number: 4
    title: "Billionaire Budgeting!"
    page: "/episode-4"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - google-apps-script.js
